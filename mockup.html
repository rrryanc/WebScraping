<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pricing Calculator Mockup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background: #eeeef3;
      color: #111;
      min-height: 100vh;
      padding: 64px 32px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2.25rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #111;
      margin-bottom: 28px;
    }

    /* ── Two-column layout ── */
    .calc-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
      align-items: start;
    }

    /* ── Card base ── */
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 32px 36px;
    }

    /* ── Left card: inputs ── */

    /* Top row: two number fields */
    .top-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }
    .field-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #222;
      margin-bottom: 8px;
    }
    .field-group input[type="number"] {
      width: 100%;
      padding: 10px 14px;
      font-size: 0.95rem;
      color: #111;
      background: #fff;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .field-group input[type="number"]:focus { border-color: #6b5cf6; }

    .divider {
      height: 1px;
      background: #e5e7eb;
      margin: 8px 0 24px;
    }

    .section-label {
      font-size: 0.95rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 20px;
    }

    /* Slider rows */
    .slider-group {
      display: grid;
      grid-template-columns: 140px 1fr 96px;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }
    .slider-group .slider-label {
      font-size: 0.875rem;
      color: #444;
    }

    /* Custom slider */
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 5px;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
      /* filled left portion via JS background update */
      background: linear-gradient(to right, #6b5cf6 0%, #6b5cf6 50%, #d1d5db 50%, #d1d5db 100%);
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #6b5cf6;
      border: 3px solid #fff;
      box-shadow: 0 0 0 1.5px #6b5cf6, 0 2px 6px rgba(107,92,246,0.3);
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #6b5cf6;
      border: 3px solid #fff;
      box-shadow: 0 0 0 1.5px #6b5cf6;
      cursor: pointer;
    }

    .slider-number {
      padding: 8px 12px;
      font-size: 0.9rem;
      color: #111;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      outline: none;
      font-family: inherit;
      text-align: right;
      width: 100%;
      transition: border-color 0.15s;
    }
    .slider-number:focus { border-color: #6b5cf6; }

    /* Additional inputs below sliders */
    .extra-inputs {
      margin-top: 8px;
    }
    .extra-row {
      display: grid;
      grid-template-columns: 140px 1fr 96px;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }
    .extra-row .extra-label {
      font-size: 0.875rem;
      color: #444;
    }
    .extra-row .input-with-suffix {
      display: flex;
      align-items: center;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      overflow: hidden;
      grid-column: 2 / 4;
      transition: border-color 0.15s;
    }
    .extra-row .input-with-suffix:focus-within { border-color: #6b5cf6; }
    .extra-row .input-with-suffix input {
      flex: 1;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 0.9rem;
      padding: 8px 12px;
      color: #111;
    }
    .extra-row .input-with-suffix .sfx {
      padding: 8px 12px;
      font-size: 0.85rem;
      color: #9ca3af;
      background: #f9fafb;
      border-left: 1px solid #e5e7eb;
    }

    /* ── Right card: summary ── */
    .summary-card {
      background: #fff;
      border-radius: 14px;
      padding: 28px 32px;
    }

    .summary-card h2 {
      font-size: 1.05rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 24px;
    }

    .cost-line {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
    }
    .cost-line .cost-name {
      font-size: 0.9rem;
      color: #6b7280;
    }
    .cost-line .cost-value {
      font-size: 0.9rem;
      color: #111;
      font-weight: 500;
    }
    .cost-line .cost-value.credit {
      color: #16a34a;
    }

    .summary-divider {
      height: 1px;
      background: #e5e7eb;
      margin: 8px 0 16px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 28px;
    }
    .total-row .total-label {
      font-size: 1rem;
      font-weight: 700;
      color: #111;
    }
    .total-row .total-amount {
      font-size: 2rem;
      font-weight: 800;
      color: #111;
      letter-spacing: -0.03em;
    }

    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .btn {
      padding: 11px 16px;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      font-family: inherit;
      transition: all 0.15s;
    }
    .btn-outline {
      background: #fff;
      border: 1.5px solid #d1d5db;
      color: #111;
    }
    .btn-outline:hover { border-color: #9ca3af; background: #f9fafb; }
    .btn-primary {
      background: #6b5cf6;
      border: 1.5px solid #6b5cf6;
      color: #fff;
    }
    .btn-primary:hover { background: #5b4de0; border-color: #5b4de0; }

    /* discount note */
    .discount-note {
      font-size: 0.78rem;
      color: #16a34a;
      margin-top: 12px;
      text-align: center;
    }

    @media (max-width: 760px) {
      .calc-layout { grid-template-columns: 1fr; }
      .slider-group { grid-template-columns: 120px 1fr 80px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Cost calculator</h1>

    <div class="calc-layout">

      <!-- ── LEFT: Inputs ── -->
      <div class="card">
        <div class="top-inputs">
          <div class="field-group">
            <label>Initial Indexing (TB)</label>
            <input type="number" id="initialIndexing" value="10" min="0" />
          </div>
          <div class="field-group">
            <label>1-time Credit Allotment</label>
            <input type="number" id="creditAllotment" value="500" min="0" />
          </div>
        </div>

        <div class="divider"></div>
        <div class="section-label">Monthly Usage</div>

        <div class="slider-group">
          <span class="slider-label">Indexing (TB)</span>
          <input type="range" id="s-indexing" min="0" max="500" value="5" />
          <input type="number" class="slider-number" id="n-indexing" value="5" min="0" max="500" />
        </div>

        <div class="slider-group">
          <span class="slider-label">Query (hours)</span>
          <input type="range" id="s-query" min="0" max="500" value="40" />
          <input type="number" class="slider-number" id="n-query" value="40" min="0" max="500" />
        </div>

        <div class="slider-group">
          <span class="slider-label">Bandwidth (TB)</span>
          <input type="range" id="s-bandwidth" min="0" max="200" value="8" />
          <input type="number" class="slider-number" id="n-bandwidth" value="8" min="0" max="200" />
        </div>

        <div class="slider-group">
          <span class="slider-label">Storage (TB)</span>
          <input type="range" id="s-storage" min="0" max="500" value="25" />
          <input type="number" class="slider-number" id="n-storage" value="25" min="0" max="500" />
        </div>

        <div class="divider" style="margin-top:8px;"></div>

        <div class="extra-inputs">
          <div class="extra-row">
            <span class="extra-label">Advance Purchase Discount</span>
            <div class="input-with-suffix">
              <input type="number" id="discount" value="10" min="0" max="100" />
              <span class="sfx">%</span>
            </div>
          </div>
        </div>
      </div>

      <!-- ── RIGHT: Summary ── -->
      <div class="summary-card">
        <h2>Estimated Monthly Costs</h2>

        <div class="cost-line">
          <span class="cost-name">Indexing</span>
          <span class="cost-value" id="out-indexing">$125</span>
        </div>
        <div class="cost-line">
          <span class="cost-name">Query</span>
          <span class="cost-value" id="out-query">$400</span>
        </div>
        <div class="cost-line">
          <span class="cost-name">Bandwidth</span>
          <span class="cost-value" id="out-bandwidth">$80</span>
        </div>
        <div class="cost-line">
          <span class="cost-name">Storage</span>
          <span class="cost-value" id="out-storage">$250</span>
        </div>
        <div class="cost-line">
          <span class="cost-name">1-time credit (amortized)</span>
          <span class="cost-value credit" id="out-credit">−$500</span>
        </div>

        <div class="summary-divider"></div>

        <div class="total-row">
          <span class="total-label">Total</span>
          <span class="total-amount" id="out-total">$297</span>
        </div>

        <div class="btn-group">
          <button class="btn btn-outline">Contact sales</button>
          <button class="btn btn-primary">Get started</button>
        </div>

        <div class="discount-note" id="discount-note">Saving 10% with advance purchase</div>
      </div>

    </div>
  </div>

  <script>
    // ── Placeholder rates (swap for real spreadsheet values) ──
    const RATES = {
      indexing:  25,   // $ per TB / mo
      query:     10,   // $ per hour / mo
      bandwidth: 10,   // $ per TB / mo
      storage:   10,   // $ per TB / mo
    };

    function fmt(n) {
      return '$' + Math.max(0, Math.round(n)).toLocaleString();
    }

    function recalc() {
      const indexing  = +document.getElementById('n-indexing').value;
      const query     = +document.getElementById('n-query').value;
      const bandwidth = +document.getElementById('n-bandwidth').value;
      const storage   = +document.getElementById('n-storage').value;
      const credit    = +document.getElementById('creditAllotment').value;
      const discount  = +document.getElementById('discount').value / 100;

      const rawIndexing  = indexing  * RATES.indexing;
      const rawQuery     = query     * RATES.query;
      const rawBandwidth = bandwidth * RATES.bandwidth;
      const rawStorage   = storage   * RATES.storage;

      const subtotal = (rawIndexing + rawQuery + rawBandwidth + rawStorage) * (1 - discount);
      const total    = Math.max(0, subtotal - credit);

      document.getElementById('out-indexing').textContent  = fmt(rawIndexing * (1 - discount));
      document.getElementById('out-query').textContent     = fmt(rawQuery * (1 - discount));
      document.getElementById('out-bandwidth').textContent = fmt(rawBandwidth * (1 - discount));
      document.getElementById('out-storage').textContent   = fmt(rawStorage * (1 - discount));
      document.getElementById('out-credit').textContent    = '−' + fmt(credit);
      document.getElementById('out-total').textContent     = fmt(total);

      const pct = Math.round(discount * 100);
      const note = document.getElementById('discount-note');
      note.style.display = pct > 0 ? 'block' : 'none';
      note.textContent = `Saving ${pct}% with advance purchase`;
    }

    // Sync sliders ↔ number inputs + update track fill
    function updateTrack(slider) {
      const pct = (slider.value - slider.min) / (slider.max - slider.min) * 100;
      slider.style.background = `linear-gradient(to right, #6b5cf6 ${pct}%, #6b5cf6 ${pct}%, #d1d5db ${pct}%, #d1d5db 100%)`;
    }

    [['s-indexing','n-indexing'], ['s-query','n-query'],
     ['s-bandwidth','n-bandwidth'], ['s-storage','n-storage']].forEach(([sid, nid]) => {
      const slider = document.getElementById(sid);
      const num    = document.getElementById(nid);

      updateTrack(slider);

      slider.addEventListener('input', () => {
        num.value = slider.value;
        updateTrack(slider);
        recalc();
      });
      num.addEventListener('input', () => {
        slider.value = num.value;
        updateTrack(slider);
        recalc();
      });
    });

    ['creditAllotment', 'discount', 'initialIndexing'].forEach(id => {
      document.getElementById(id).addEventListener('input', recalc);
    });

    recalc();
  </script>
</body>
</html>
