name: Update pricing calculator

on:
  push:
    branches: [main]
    paths:
      - 'packages/docs/docs/pricing.mdx'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Regenerate pricing block in calculator
        run: python3 packages/docs/scripts/update-pricing.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/docs/static/pricing-calculator.html
          git diff --staged --quiet && echo "No pricing changes." || \
            git commit -m "Update pricing calculator rates" && git push
